<!DOCTYPE html>
<html>
<head>
    <title>Receivables</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <a href="/portal" class="btn btn-secondary mb-3">← Back</a>

    <h3>Receivables / ዱቤ ያለባቸው ደንበኞች ዝርዝር</h3>

    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr>
                <th>Customer</th>
                <th>Amount Due</th>
                <th>Sale Date</th>
                <th>Pay</th>
                <th>View Balance</th>
                <th>History</th>
            </tr>
        </thead>

        <tbody>
            {% for r in receivables %}
            <tr>
                <!-- Customer Name -->
                 <td>{{ r[2] }}</td>
                 <!-- Amount Due -->
                  <td>{{ r[3] }}</td>
                  <!-- Sale Date -->
                   <td>{{ r[4] }}</td>
                   <!-- Pay -->
                    <td>
                        <form method="POST" action="/pay_receivable/{{ r[0] }}">
                            <input type="number" step="0.01" name="amount" placeholder="Amount" required>
                            <input type="text" name="reference_note" placeholder="Reference / Note" class="mt-1">
                            <button class="btn btn-success btn-sm mt-1">Pay</button>
                        </form>
                    </td>
                    <!-- ✅ FIXED: View Balance -->
                     <td>
                        <a href="/customer_balance/{{ r[1] }}">{{ r[2] }}: balance</a>
                     </td>
                     <!-- ⚠️ IMPORTANT: Fix this too -->
                      <td>
                        <a href="/payment_history/{{ r[0] }}" class="btn btn-sm btn-info">History</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
