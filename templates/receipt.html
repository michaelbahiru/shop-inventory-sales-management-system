<!DOCTYPE html>
<html>
<head>
    <title>Receipt #{{ sale[0] }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        /* Base styles for the "paper" */
        body {
            font-family: "Courier New", Courier, monospace; /* Classic receipt font */
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .receipt-card {
            background: #fff;
            width: 350px; /* Standard thermal printer width */
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header-info {
            font-size: 0.9em;
            margin-bottom: 20px;
            border-bottom: 1px dashed #000;
            padding-bottom: 10px;
        }

        .header-info p {
            margin: 3px 0;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            border-bottom: 2px solid #000;
            padding: 5px 0;
        }

        td {
            padding: 8px 0;
            vertical-align: top;
        }

        .text-right {
            text-align: right;
        }

        .total-section {
            border-top: 2px solid #000;
            margin-top: 15px;
            padding-top: 10px;
            text-align: right;
        }

        /* Buttons and Navigation */
        .actions {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-link {
            display: block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 0.8em;
        }

        /* Hide buttons when printing */
        @media print {
            body { background: white; padding: 0; }
            .receipt-card { box-shadow: none; border: none; width: 100%; }
            .actions { display: none; }
        }
    </style>
</head>
<body>

<div class="receipt-card">
    <h2>Shop Receipt</h2>
    
    <div class="header-info">
        <p><strong>Sale ID:</strong> {{ sale[0] }}</p>
        <p><strong>Customer:</strong> {{ sale[3] or "Walk-in" }}</p>
        <p><strong>Payment:</strong> {{ "Credit" if sale[2] else "Cash" }}</p>
        <p><strong>Date and Time:</strong><div class="details">
            <!-- ሰዓቱ እዚህ ጋር ይቀመጣል -->
                      <div class="date-time"><span id="transaction-time"></span></div>
                      </div></p>




    </div>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th class="text-right">Total</th>
            </tr>
        </thead>
        <tbody>
            {% for i in items %}
            <tr>
                <td>{{ i[0] }}<br><small>@ {{ i[2] }}</small></td>
                <td>x{{ i[1] }}</td>
                <td class="text-right">{{ i[1] * i[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="total-section">
        <h3>TOTAL: {{ sale[1] }}</h3>
    </div>

    <div class="actions">
        <button onclick="window.print()">Print Receipt</button>
        <a href="/sales" class="nav-link">← Return to New Sale</a>
    </div>
</div>



 <script>
   // ገጹ እንደተከፈተ ያለውን ሰዓት አንዴ ብቻ ይይዛል
        function recordTransactionTime() {
            const now = new Date();
            
            const options = { 
                timeZone: 'Africa/Addis_Ababa',
                month: 'long', 
                day: 'numeric', 
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true 
            };

            let formattedDate = now.toLocaleString('en-US', options);
            
            // ፎርማቱን ማስተካከል (ለምሳሌ፦ May 16 2026 - 8:00 PM)
            formattedDate = formattedDate.replace(',', '').replace(',', ' -');

            // በገጹ ላይ ያለውን ቦታ በሰዓቱ መተካት
            document.getElementById('transaction-time').innerText = formattedDate;
        }

        // ገጹ ሲጫን ተግባራዊ እንዲሆን
        window.onload = recordTransactionTime;
      

</script>


</body>
</html>
