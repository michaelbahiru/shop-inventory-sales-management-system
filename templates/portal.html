<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mgmt-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
            text-decoration: none; /* Removes link underline */
            display: block; /* Makes anchor behave like a block */
        }

        .mgmt-btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .mgmt-btn:active {
            transform: translateY(0);
        }

        /* Logic-based colors based on your style guide */
        .dashboard { border-left: 5px solid #856404; }
        .suppliers { border-left: 5px solid #9b59b6; }
        .inventory { border-left: 5px solid #e67e22; }
        .payables { border-left: 5px solid #e74c3c; }
        .customers { border-left: 5px solid #f1c40f; }
        .sales { border-left: 5px solid #27ae60; }
        .receivable { border-left: 5px solid #2980b9; }
        .reports { border-left: 5px solid #95a5a6; }
        .Staff_add { border-left: 5px solid #64cdd4; }

        .logout-btn {
            margin-top: 10px;
            background-color: #c0392b;
            text-align: center;
            border-left: none;
        }
        
        .logout-btn:hover {
            background-color: #e74c3c;
        }

        .Register-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Management Portal ሱቅ ማስተዳደሪያ</h1>
    
    <div class="button-stack">
        <a href="/dashboard" class="mgmt-btn dashboard">Dashboard / አጠቃላይ መገምገሚያ</a>
        <a href="/suppliers" class="mgmt-btn suppliers">Suppliers Management / እቃ አቅራቢዎች</a>
        <a href="/inventory" class="mgmt-btn inventory">Inventory Management / እቃ መቆጣጠሪያ</a>
        <a href="/payables" class="mgmt-btn payables">Accounts Payable / እዳ መቆጣጠሪያ</a>
        <a href="/customers" class="mgmt-btn customers">Customer Management / ደንበኞች</a>
        <a href="/sales" class="mgmt-btn sales">Sales & POS / እቃ መሸጫ</a>
        <a href="/receivables" class="mgmt-btn receivable">Accounts Receivable / ዱቤ መቆጣጠሪያ</a>
        <a href="/reports" class="mgmt-btn reports">Business Reports / ሪፖርት </a><br>
        <a href="/register" class="mgmt-btn Staff_add">Create New staff</a>

        
        <a href="/logout" class="mgmt-btn logout-btn">Logout / ዝግተህ ውጣ(ውጪ)</a>
    </div>
</div>

</body>
</html>
