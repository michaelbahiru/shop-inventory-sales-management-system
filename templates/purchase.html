<!DOCTYPE html>
<html>
<head>

    <title>Purchase Product</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <a href="/inventory"
       class="btn btn-secondary mb-3">
       ← Back to Inventory
    </a>

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-4">
                Purchase Product
            </h3>

            <!-- PRODUCT INFO -->
            <div class="alert alert-primary">

                <strong>Product:</strong>
                {{ product[1] }}

                <br>

                <strong>Category:</strong>
                {{ product[2] }}

            </div>

            <!-- PURCHASE FORM -->
            <form method="POST"
                  action="/complete_purchase">

                <input type="hidden"
                       name="product_id"
                       value="{{ product[0] }}">

                <!-- SUPPLIER -->
                <label class="form-label">
                    Supplier
                </label>

                <select name="supplier_id"
                        class="form-select mb-3"
                        required>

                    <option value="">
                        Select Supplier
                    </option>

                    {% for s in suppliers %}
                    <option value="{{ s[0] }}">
                        {{ s[1] }}
                    </option>
                    {% endfor %}

                </select>

                <!-- BUYING PRICE -->
                <label class="form-label">
                    Buying Price Per Unit
                </label>

                <input type="number"
                       step="0.01"
                       name="buying_price"
                       class="form-control mb-3"
                       required>

                <!-- EXTRA COST -->
                <label class="form-label">
                    Additional Cost Per Unit
                </label>

                <input type="number"
                       step="0.01"
                       name="extra_cost"
                       class="form-control mb-3"
                       value="0">

                <!-- QUANTITY -->
                <label class="form-label">
                    Quantity
                </label>

                <input type="number"
                       name="quantity"
                       class="form-control mb-3"
                       required>

                <!-- SELLING PRICE -->
                <label class="form-label">
                    Selling Price Per Unit
                </label>

                <input type="number"
                       step="0.01"
                       name="selling_price"
                       class="form-control mb-3"
                       required>

                <!-- CREDIT -->
                <div class="form-check mb-3">

                    <input class="form-check-input"
                           type="checkbox"
                           name="is_credit">

                    <label class="form-check-label">
                        Purchased On Credit
                    </label>

                </div>

                <!-- DESCRIPTION -->
                <label class="form-label">
                    Purchase Description
                </label>

                <textarea name="description"
                          class="form-control mb-4"
                          rows="3"></textarea>

                <!-- SUBMIT -->
                <button class="btn btn-success w-100 btn-lg">

                    Complete Purchase

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
