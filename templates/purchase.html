<!DOCTYPE html>
<html>
<head>
    <title>Purchase</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .product-card {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .sticky-total {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-3">

<a href="/portal" class="btn btn-secondary w-100 mb-3">← Back</a>

<div class="row">

<!-- 🔵 LEFT: PRODUCTS -->
<div class="col-12 col-md-6">

    <h5>Select Products</h5>

    {% for p in products %}
    <div class="product-card shadow-sm">

        <strong>{{ p[1] }}</strong>

        <!-- Quantity -->
        <input type="number" id="qty_{{ p[0] }}" class="form-control mt-2" placeholder="Quantity">

        <!-- Cost -->
        <input type="number" step="0.01" id="cost_{{ p[0] }}" class="form-control mt-2" placeholder="Unit Cost">

        <button class="btn btn-primary w-100 mt-2"
            onclick="addToCart({{ p[0] }}, '{{ p[1] }}')">
            Add
        </button>

    </div>
    {% endfor %}

</div>

<!-- 🔴 RIGHT: CART -->
<div class="col-12 col-md-6">

    <h5>Purchase Cart</h5>

    <!-- Supplier -->
    <select id="supplier_id" class="form-select mb-2">
        <option value="">Select Supplier</option>
        {% for s in suppliers %}
        <option value="{{ s[0] }}">{{ s[1] }}</option>
        {% endfor %}
    </select>

    <!-- Credit -->
    <div class="form-check mb-2">
        <input type="checkbox" id="is_credit" class="form-check-input">
        <label class="form-check-label">Purchase on Credit</label>
    </div>

    <!-- Cart Table -->
    <table class="table" id="cart-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Cost</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="sticky-total">
        <h4>Total: <span id="grand-total">0</span></h4>
        <button class="btn btn-success w-100" onclick="completePurchase()">
            Complete Purchase
        </button>
    </div>

</div>

</div>
</div>

<script>

let cart = {};

function addToCart(id, name) {

    let qty = parseInt(document.getElementById("qty_" + id).value);
    let cost = parseFloat(document.getElementById("cost_" + id).value);

    if (!qty || !cost) {
        alert("Enter quantity and cost!");
        return;
    }

    if (!cart[id]) {
        cart[id] = {name: name, qty: qty, cost: cost};
    } else {
        cart[id].qty += qty;
    }

    renderCart();
}

function renderCart() {

    let tbody = document.querySelector("#cart-table tbody");
    tbody.innerHTML = "";
    let total = 0;

    for (let id in cart) {

        let item = cart[id];
        let rowTotal = item.qty * item.cost;
        total += rowTotal;

        tbody.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.qty}</td>
            <td>${item.cost}</td>
            <td>${rowTotal}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="removeItem(${id})">X</button>
            </td>
        </tr>`;
    }

    document.getElementById("grand-total").innerText = total;
}

function removeItem(id) {
    delete cart[id];
    renderCart();
}

function completePurchase() {

    let supplier_id = document.getElementById("supplier_id").value;
    let is_credit = document.getElementById("is_credit").checked;

    if (!supplier_id) {
        alert("Select supplier!");
        return;
    }

    if (Object.keys(cart).length === 0) {
        alert("Cart empty!");
        return;
    }

    fetch('/complete_purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            cart: cart,
            supplier_id: supplier_id,
            is_credit: is_credit
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "error") {
            alert(data.message);
            return;
        }

        alert("Purchase completed!");
        location.reload();

    });
}

</script>

</body>
</html>
