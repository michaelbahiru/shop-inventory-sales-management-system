<!DOCTYPE html>
<html>
<head>
    <title>Supplier Dashboard</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<a href="/portal" class="btn btn-secondary mb-3">← Back</a>

<h3>Supplier Balance Dashboard</h3>

<!-- 🔴 TOTAL EXPOSURE -->
<div class="alert alert-danger">
    <strong>Total Payables:</strong> {{ total_exposure }}
</div>

<!-- 🔵 TABLE -->
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Supplier</th>
            <th>Total Due</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    {% for s in suppliers %}
        <tr>

            <td>{{ s[1] }}</td>

            <td>
                <strong>{{ s[2] }}</strong>

                {% if s[2] == 0 %}
                    <span class="badge bg-success">Clear</span>
                {% elif s[2] < 5000 %}
                    <span class="badge bg-warning text-dark">Low</span>
                {% else %}
                    <span class="badge bg-danger">High</span>
                {% endif %}
            </td>

            <td>
                <!-- <a href="/supplier_ledger/{{ s[0] }}" class="btn btn-sm btn-primary">
                    View Ledger
                </a> -->
            </td>

        </tr>
    {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
