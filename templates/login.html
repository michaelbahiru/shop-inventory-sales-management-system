<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        /* Styling the Input Fields */
        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #2c3e50;
            background-color: #fcfcfc;
        }

        /* Using the mgmt-btn style for the Login button */
        .login-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .register-link:hover {
            color: #2c3e50;
            text-decoration: underline;
        }

        .warning-notes {
            background-color: #fff3cd; /* ፈዘዝ ያለ ቢጫ ዳራ */
            color: #856404;            /* ጥቁር ያለ ቢጫ ጽሑፍ */
            border: 1px solid #ffeeba; /* የጠርዝ መስመር */
            padding: 15px;             /* የውስጥ ክፍተት */
            margin: 10px 0;            /* የውጭ ክፍተት */
            border-radius: 4px;        /* የጠርዝ ቅርጽ */
            font-family: Arial, sans-serif;
            border-left: 5px solid #ffc107; /* በግራ በኩል ጎልቶ የሚታይ መስመር */
        }

    </style>
</head>
<body>

<div class="login-container">
    <h2>Login / መግቢያ</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="login-btn">Login</button>
    </form>
<p Class="warning-notes">This System is restricted for non account holders!!!</p>
<p Class="warning-notes">If you Don't have an account Contact to the Admin!!!</p>
<p Class="warning-notes">አካውንት ከሌሎት መግባት የተከለከለ ነው!</p>
<p Class="warning-notes">አካውንት ከሌሎት አስትዳድሩን ያናግሩ!</p>
<!--<a href="/register" class="register-link">Don't have an account? Create one</a>-->
    
</div>

</body>
</html>
