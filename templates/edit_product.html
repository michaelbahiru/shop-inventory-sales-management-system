<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <!-- Modern font for a professional look -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b; /* Amber theme for Editing */
            --primary-hover: #d97706;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* Header Navigation */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            padding: 5px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            flex-grow: 1;
            text-align: center;
            margin-right: 30px; /* Counter-balance back button for center alignment */
        }

        /* Form Styling */
        .edit-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 16px; /* Prevents auto-zoom on iPhone */
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fcfcfc;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        .update-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .update-btn:active {
            transform: scale(0.98);
            background-color: var(--primary-hover);
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/inventory" class="back-btn">✕</a>
        <h2>Edit Product</h2>
    </div>

    <div class="edit-card">
        <form method="POST">
            <div class="form-group">
                <label>PRODUCT NAME</label>
                <input type="text" name="name" value="{{ product[1] }}" placeholder="Enter name" required>
            </div>

            <div class="form-group">
                <label>SELLING PRICE ($)</label>
                <input type="number" step="0.01" name="selling_price" value="{{ product[6] }}" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label>CURRENT STOCK QUANTITY</label>
                <input type="number" name="quantity" value="{{ product[7] }}" placeholder="0" required>
            </div>

            <button type="submit" class="update-btn">Save Changes</button>
        </form>
    </div>

    <div class="footer-note">
        Changes will be reflected in the inventory immediately.
    </div>
</div>

</body>
</html>
