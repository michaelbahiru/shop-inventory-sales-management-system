<!DOCTYPE html>
<html>
<head>
    <title>Payment History</title>
</head>
<body>

<h2>Payment History</h2>

<table border="1">
    <tr>
        <th>Amount</th>
        <th>Reference</th>
        <th>Date</th>
    </tr>

    {% for p in payments %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/receivables">Back</a>

</body>
</html>
